name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NODE_ENV: production
          # Optional overrides — committed defaults in src/config/tracking.public.ts are used if unset
          NEXT_PUBLIC_META_PIXEL_ID: ${{ vars.NEXT_PUBLIC_META_PIXEL_ID }}
          NEXT_PUBLIC_GA4_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA4_MEASUREMENT_ID }}
          NEXT_PUBLIC_GTM_ID: ${{ vars.NEXT_PUBLIC_GTM_ID }}
          NEXT_PUBLIC_GOOGLE_SHEETS_WEBHOOK_URL: ${{ vars.NEXT_PUBLIC_GOOGLE_SHEETS_WEBHOOK_URL }}
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}

      - name: Verify Meta Pixel is in exported HTML
        run: grep -qE 'meta-pixel|fbq\(' out/index.html

      - name: Verify Google Sheets webhook is in build
        run: |
          if [ -z "$NEXT_PUBLIC_GOOGLE_SHEETS_WEBHOOK_URL" ]; then
            echo "::error::NEXT_PUBLIC_GOOGLE_SHEETS_WEBHOOK_URL is empty. Add it under Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi
          npm run export:verify:webhook
        env:
          NEXT_PUBLIC_GOOGLE_SHEETS_WEBHOOK_URL: ${{ vars.NEXT_PUBLIC_GOOGLE_SHEETS_WEBHOOK_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
